services:
  postgres:
    image: postgres:16-alpine
    container_name: pocketflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pocketflow
      POSTGRES_PASSWORD: pocketflow
      POSTGRES_DB: pocketflow
    ports:
      - '5433:5432'
    volumes:
      - pocketflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pocketflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pocketflow-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - pocketflow_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pocketflow-adminer
    restart: unless-stopped
    ports:
      - '8081:8080'
    depends_on:
      - postgres

volumes:
  pocketflow_pg_data:
  pocketflow_redis_data:
