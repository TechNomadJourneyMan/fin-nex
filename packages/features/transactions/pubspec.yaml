name: pf_feat_transactions
description: Pocket Flow transactions feature module.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.20.0
  equatable: ^2.0.5
  decimal: ^3.0.2
  pf_core_feedback:
    path: ../../core/feedback
  pf_core_l10n:
    path: ../../core/l10n
  pf_core_theme:
    path: ../../core/theme
  pf_core_tokens:
    path: ../../core/tokens
  pf_core_widgets:
    path: ../../core/widgets
  pf_domain:
    path: ../../domain
  pf_data_sync:
    path: ../../data/sync
  pf_calendar:
    path: ../../services/calendar

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # FeedbackService persists its toggles in SharedPreferences; tests provide a
  # mock-backed instance via SharedPreferences.setMockInitialValues.
  shared_preferences: ^2.3.2
