name: pf_core_widgets
description: Pocket Flow shared widget library (buttons, cards, sheets, fields).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  pf_core_theme:
    path: ../theme
  pf_core_tokens:
    path: ../tokens
  pf_domain:
    path: ../../domain
  intl: ^0.20.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/lottie/
