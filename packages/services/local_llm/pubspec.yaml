name: fnx_local_llm
description: On-device LLM (Gemma via flutter_gemma) for Pocket Flow — private,
  offline inference for receipt parsing, push categorisation and quick advice.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^0.10.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
