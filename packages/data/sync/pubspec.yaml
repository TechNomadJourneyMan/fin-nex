name: pf_data_sync
description: Pocket Flow offline-first sync engine (outbox, pull cursors, conflict resolver).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  pf_domain:
    path: ../../domain
  pf_data_local:
    path: ../local
  pf_data_api:
    path: ../api
  flutter_riverpod: ^2.5.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.0
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
