name: finnex
description: Pocket Flow — personal finance tracker (Flutter app entrypoint).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.0

  # Pocket Flow packages
  fnx_core_theme:
    path: ../../packages/core/theme
  fnx_core_tokens:
    path: ../../packages/core/tokens
  fnx_core_widgets:
    path: ../../packages/core/widgets
  fnx_core_charts:
    path: ../../packages/core/charts
  fnx_core_l10n:
    path: ../../packages/core/l10n
  fnx_domain:
    path: ../../packages/domain
  fnx_data_local:
    path: ../../packages/data/local
  fnx_data_api:
    path: ../../packages/data/api
  fnx_data_sync:
    path: ../../packages/data/sync
  fnx_feat_auth:
    path: ../../packages/features/auth
  fnx_feat_onboarding:
    path: ../../packages/features/onboarding
  fnx_feat_transactions:
    path: ../../packages/features/transactions
  fnx_feat_categories:
    path: ../../packages/features/categories
  fnx_feat_budgets:
    path: ../../packages/features/budgets
  fnx_feat_analytics:
    path: ../../packages/features/analytics
  fnx_feat_notifications:
    path: ../../packages/features/notifications
  fnx_feat_settings:
    path: ../../packages/features/settings
  fnx_feat_insights:
    path: ../../packages/features/insights
  fnx_feat_dashboard:
    path: ../../packages/features/dashboard
  fnx_feat_subscriptions:
    path: ../../packages/features/subscriptions
  fnx_feat_ai_chat:
    path: ../../packages/features/ai_chat
  fnx_feat_workspaces:
    path: ../../packages/features/workspaces
  fnx_sms_parser:
    path: ../../packages/services/sms_parser
  fnx_local_llm:
    path: ../../packages/services/local_llm

  # Direct deps surfaced by the new feature packages.
  flutter_markdown: ^0.7.4

  # Auth wiring: token + device-id persistence and the typed Dio client.
  shared_preferences: ^2.3.2
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
