<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Pocket Flow — premium personal finance OS.">
  <meta name="theme-color" content="#0A0A0C">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pocket Flow">

  <base href="$FLUTTER_BASE_HREF">

  <title>Pocket Flow</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg: #0A0A0C;
      --fg: #F2F2F3;
      --muted: #8A8A93;
      --accent: #E5E5EA;
      --hairline: rgba(255, 255, 255, 0.08);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      transition: opacity 320ms ease;
      padding: 24px;
      box-sizing: border-box;
    }
    #splash .wordmark {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.6px;
      color: var(--fg);
      margin-bottom: 8px;
    }
    #splash .tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }
    .progress-wrap {
      width: 100%;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background-color: var(--hairline);
      overflow: hidden;
      position: relative;
    }
    .progress-bar::before {
      content: '';
      position: absolute;
      left: -40%;
      top: 0;
      bottom: 0;
      width: 40%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--accent) 50%,
        transparent 100%
      );
      animation: slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      will-change: transform;
    }
    @keyframes slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(350%); }
    }
    .stage {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.2px;
      font-variant-numeric: tabular-nums;
      min-height: 16px;
      text-align: center;
      transition: opacity 200ms ease;
    }
    .elapsed {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
      margin-top: 4px;
    }
    .slow-help {
      margin-top: 32px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeIn 400ms ease;
    }
    .slow-help.show { display: flex; }
    .slow-help .hint {
      font-size: 12px;
      color: #FFB840;
      text-align: center;
      max-width: 320px;
      line-height: 1.4;
    }
    .reload-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 0.5px solid var(--hairline);
      color: var(--fg);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 160ms ease;
      font-family: inherit;
    }
    .reload-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .reload-btn:active {
      transform: scale(0.97);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="wordmark">Pocket Flow</div>
    <div class="tag">OmniFi OS</div>
    <div class="progress-wrap">
      <div class="progress-bar" role="progressbar" aria-label="Загрузка"></div>
      <div class="stage" id="splash-stage">Загружаю движок…</div>
      <div class="elapsed" id="splash-elapsed">0.0 s</div>
    </div>
    <div class="slow-help" id="splash-slow">
      <div class="hint">
        Загрузка идёт дольше обычного.<br>
        Попробуйте обновить страницу.
      </div>
      <button class="reload-btn" onclick="location.reload()">
        Перезагрузить
      </button>
    </div>
  </div>

  <script>
    (function () {
      var start = performance.now();
      var stageEl = document.getElementById('splash-stage');
      var elapsedEl = document.getElementById('splash-elapsed');
      var slowEl = document.getElementById('splash-slow');
      var splash = document.getElementById('splash');

      var stages = [
        { atMs: 0,    text: 'Загружаю движок…' },
        { atMs: 1500, text: 'Скачиваю модули…' },
        { atMs: 4000, text: 'Компилирую интерфейс…' },
        { atMs: 8000, text: 'Почти готово…' },
      ];
      var slowThresholdMs = 15000;

      var ticker = setInterval(function () {
        var elapsedMs = performance.now() - start;
        var elapsedSec = (elapsedMs / 1000).toFixed(1);
        if (elapsedEl) elapsedEl.textContent = elapsedSec + ' s';

        for (var i = stages.length - 1; i >= 0; i--) {
          if (elapsedMs >= stages[i].atMs) {
            if (stageEl && stageEl.textContent !== stages[i].text) {
              stageEl.style.opacity = '0';
              setTimeout(function (t) {
                if (stageEl) {
                  stageEl.textContent = t;
                  stageEl.style.opacity = '1';
                }
              }, 180, stages[i].text);
            }
            break;
          }
        }

        if (elapsedMs >= slowThresholdMs && slowEl && !slowEl.classList.contains('show')) {
          slowEl.classList.add('show');
        }
      }, 100);

      window.addEventListener('flutter-first-frame', function () {
        clearInterval(ticker);
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.remove();
          }, 320);
        }
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
