name: pocketflow
description: Pocket Flow — personal finance tracker (Flutter app entrypoint).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.0

  # Pocket Flow packages
  pf_core_theme:
    path: ../../packages/core/theme
  pf_core_tokens:
    path: ../../packages/core/tokens
  pf_core_widgets:
    path: ../../packages/core/widgets
  pf_core_charts:
    path: ../../packages/core/charts
  pf_core_l10n:
    path: ../../packages/core/l10n
  pf_core_feedback:
    path: ../../packages/core/feedback
  pf_domain:
    path: ../../packages/domain
  pf_data_local:
    path: ../../packages/data/local
  pf_data_api:
    path: ../../packages/data/api
  pf_data_sync:
    path: ../../packages/data/sync
  pf_feat_auth:
    path: ../../packages/features/auth
  pf_feat_onboarding:
    path: ../../packages/features/onboarding
  pf_feat_transactions:
    path: ../../packages/features/transactions
  pf_feat_categories:
    path: ../../packages/features/categories
  pf_feat_budgets:
    path: ../../packages/features/budgets
  pf_feat_analytics:
    path: ../../packages/features/analytics
  pf_feat_notifications:
    path: ../../packages/features/notifications
  pf_feat_settings:
    path: ../../packages/features/settings
  pf_feat_insights:
    path: ../../packages/features/insights
  pf_feat_dashboard:
    path: ../../packages/features/dashboard
  pf_feat_receipt_scanner:
    path: ../../packages/features/receipt_scanner
  pf_feat_subscriptions:
    path: ../../packages/features/subscriptions
  pf_feat_ai_chat:
    path: ../../packages/features/ai_chat
  pf_feat_workspaces:
    path: ../../packages/features/workspaces
  pf_sms_parser:
    path: ../../packages/services/sms_parser
  pf_local_llm:
    path: ../../packages/services/local_llm
  pf_calendar:
    path: ../../packages/services/calendar

  # Direct deps surfaced by the new feature packages.
  flutter_markdown: ^0.7.4
  # Material motion (PageTransitionSwitcher + SharedAxisTransition).
  animations: ^2.0.11

  # Auth wiring: token + device-id persistence and the typed Dio client.
  shared_preferences: ^2.3.2
  dio: ^5.7.0

  # Home-screen widgets (iOS WidgetKit / Android AppWidget) bridge.
  home_widget: ^0.6.0
  # OS share sheet ("integration with other apps") + .ics export hand-off.
  share_plus: ^10.0.0

  # Drag-and-drop file import (web/desktop) + CSV parsing.
  desktop_drop: ^0.4.4
  csv: ^6.0.0
  # XFile type used by desktop_drop's DropDoneDetails.
  cross_file: ^0.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Web/device integration smoke test (integration_test/web_smoke_test.dart).
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # In-memory sqflite for accessibility / widget tests.
  sqflite_common_ffi: ^2.3.3
  # Serve bundled Google Fonts from disk in tests (transitive via
  # pf_core_tokens); http is needed to build the offline fake client.
  google_fonts: ^6.2.0
  http: ^1.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
